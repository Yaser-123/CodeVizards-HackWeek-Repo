<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human vs AI Detector Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Start Screen -->
        <section id="start-screen" class="screen active">
            <div class="logo">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
            </div>
            <h1>Human vs AI</h1>
            <p>Can you tell the difference between human creativity and artificial intelligence?</p>
            <div class="stats-preview">
                <span id="home-highscore">High Score: 0</span>
            </div>
            <button id="start-btn" class="btn primary">Start Game</button>
            <button id="leaderboard-btn" class="btn secondary">Leaderboard</button>
        </section>

        <!-- Game Screen -->
        <section id="game-screen" class="screen">
            <header>
                <div class="score-board">
                    <span>Score: <strong id="score">0</strong></span>
                    <span>Streak: <strong id="streak">0</strong></span>
                </div>
                <div class="progress">Round <span id="current-round">1</span> / <span id="total-rounds">10</span></div>
            </header>
            
            <div class="media-container" id="media-container">
                <!-- Content injected here (Image, Text, or Code) -->
            </div>

            <div class="controls">
                <button class="btn choice-btn" data-choice="human">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Made by Human
                </button>
                <button class="btn choice-btn" data-choice="ai">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>
                    Generated by AI
                </button>
            </div>
        </section>

        <!-- Leaderboard Screen -->
        <section id="leaderboard-screen" class="screen">
            <h2>Leaderboard</h2>
            <div class="leaderboard-list" id="leaderboard-list">
                <!-- Leaderboard items injected here -->
            </div>
            <button id="back-btn" class="btn secondary">Back to Menu</button>
        </section>

        <!-- Result Modal -->
        <div id="result-modal" class="modal">
            <div class="modal-content">
                <div class="result-icon" id="result-icon"></div>
                <h2 id="result-title">Correct!</h2>
                <p id="result-explanation">This was actually painted by a human artist in 1890.</p>
                <button id="next-btn" class="btn primary">Next Round</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
