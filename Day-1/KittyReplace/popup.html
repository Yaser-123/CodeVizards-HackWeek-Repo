<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="logo">🐱</span>
      <h1>KittyReplace</h1>
    </div>
    <p class="tagline">Replace all images with cats</p>

    <div class="controls">
      <div class="row">
        <label for="catCount">Number of cat images to cache</label>
        <input type="number" id="catCount" min="1" max="50" value="50">
      </div>
      <button id="replaceBtn" class="btn-primary">Replace Images</button>
      <button id="restoreBtn" class="btn-secondary">Restore Originals</button>
    </div>

    <div id="status" class="status"></div>
    <div class="footer">Uses TheCatAPI</div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
