<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Kanban Board</title>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Kanban Board</h1>
      </div>
      <div class="topbar-right">
        <div class="swim-filter">
          <label>Swim Lane</label>
          <select id="swimFilter">
            <option value="all">All</option>
            <option value="feature">Feature</option>
            <option value="bug">Bug</option>
            <option value="chore">Chore</option>
          </select>
        </div>
        <button class="btn-add" onclick="openModal()">+ New Task</button>
      </div>
    </header>

    <div class="board" id="board">
      <div class="column" data-status="requested">
        <div class="col-header">
          <span class="col-dot" style="background:#64748b;"></span>
          <h2>Requested</h2>
          <span class="col-count" id="count-requested">0</span>
        </div>
        <div class="card-list" id="list-requested" data-status="requested"></div>
      </div>

      <div class="column" data-status="in-progress">
        <div class="col-header">
          <span class="col-dot" style="background:#facc15;"></span>
          <h2>In Progress</h2>
          <span class="col-count" id="count-in-progress">0</span>
          <span class="wip-badge" id="wip-badge">WIP: 2</span>
        </div>
        <div class="card-list" id="list-in-progress" data-status="in-progress"></div>
      </div>

      <div class="column" data-status="in-review">
        <div class="col-header">
          <span class="col-dot" style="background:#a78bfa;"></span>
          <h2>In Review</h2>
          <span class="col-count" id="count-in-review">0</span>
        </div>
        <div class="card-list" id="list-in-review" data-status="in-review"></div>
      </div>

      <div class="column" data-status="done">
        <div class="col-header">
          <span class="col-dot" style="background:#4ade80;"></span>
          <h2>Done</h2>
          <span class="col-count" id="count-done">0</span>
        </div>
        <div class="card-list" id="list-done" data-status="done"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="modalTitle">New Task</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="taskForm" onsubmit="saveTask(event)">
        <input type="hidden" id="taskId">

        <div class="form-row">
          <div class="form-field">
            <label>Title *</label>
            <input type="text" id="taskTitle" required placeholder="Task title">
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>Description</label>
            <textarea id="taskDesc" rows="3" placeholder="What needs to be done?"></textarea>
          </div>
        </div>

        <div class="form-row two-col">
          <div class="form-field">
            <label>Assignee</label>
            <input type="text" id="taskAssignee" placeholder="e.g. John">
          </div>
          <div class="form-field">
            <label>Deadline</label>
            <input type="date" id="taskDeadline">
          </div>
        </div>

        <div class="form-row two-col">
          <div class="form-field">
            <label>Priority</label>
            <select id="taskPriority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
          <div class="form-field">
            <label>Swim Lane</label>
            <select id="taskSwim">
              <option value="feature">Feature</option>
              <option value="bug">Bug</option>
              <option value="chore">Chore</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label>Column</label>
            <select id="taskStatus">
              <option value="requested">Requested</option>
              <option value="in-progress">In Progress</option>
              <option value="in-review">In Review</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-save">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
