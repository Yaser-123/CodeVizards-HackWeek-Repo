<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Storage Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-title">
      <img src="icon.svg" alt="Logo" class="logo">
      <div>
        <h1>Browser Storage Explorer</h1>
        <p>Manage Local Storage, Session Storage, and Cookies</p>
      </div>
    </div>
  </div>
  
  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search keys or values...">
    <div class="filters">
      <label><input type="checkbox" id="filterLocal" checked> <span class="badge local">Local</span></label>
      <label><input type="checkbox" id="filterSession" checked> <span class="badge session">Session</span></label>
      <label><input type="checkbox" id="filterCookies" checked> <span class="badge cookie">Cookies</span></label>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Key</th>
          <th>Value</th>
          <th>Size</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="storageTableBody">
        <!-- Rows populated by JS -->
      </tbody>
    </table>
  </div>
  <div id="emptyState" class="empty-state" style="display: none;">
    No storage items found matching your criteria.
  </div>

  <!-- Custom Modal for Full Value -->
  <div id="valueModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Full Value</h3>
        <button id="closeModalBtn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <pre id="modalValueContent"></pre>
      </div>
      <div class="modal-footer">
        <button id="copyValueBtn" class="btn-primary">Copy to Clipboard</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
