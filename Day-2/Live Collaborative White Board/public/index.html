<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Collaborative Whiteboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    
    <!-- LOBBY UI -->
    <div id="lobbyScreen" class="lobby-screen">
        <div class="glass-card login-card">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/><path d="M12 7v6"/><path d="M9 10h6"/></svg>
                <h2>CollabBoard</h2>
            </div>
            <p class="subtitle">Real-time collaborative drawing.</p>
            
            <div class="tabs">
                <button class="tab-btn active" id="tabJoin">Join Room</button>
                <button class="tab-btn" id="tabCreate">Create Room</button>
            </div>
            
            <div class="form-group">
                <label>Room ID</label>
                <input type="text" id="roomIdInput" placeholder="e.g. design-sync-1" autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="roomPasswordInput" placeholder="Enter room password">
            </div>
            
            <div class="error-msg" id="lobbyError"></div>
            
            <button class="btn btn-primary w-100" id="lobbyActionBtn">Join Room</button>
        </div>
    </div>

    <!-- MAIN WHITEBOARD UI (Hidden until authenticated) -->
    <div id="whiteboardScreen" class="whiteboard-screen hidden">
        
        <!-- Full Screen Canvas -->
        <canvas id="board"></canvas>
        
        <!-- Live Cursors Container -->
        <div id="cursorsContainer"></div>
        
        <!-- Top Status Bar -->
        <div class="status-bar glass-card">
            <div class="status-left">
                <span class="pulse-dot"></span>
                <span id="roomNameDisplay">Room ID</span>
            </div>
            <button class="btn-icon" id="leaveRoomBtn" title="Leave Room">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            </button>
        </div>
        
        <!-- Floating Tool Palette -->
        <div class="tool-palette glass-card" id="toolPalette">
            <div class="tools-group">
                <button class="tool-btn active" data-tool="pen" title="Pen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 5-3-3H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="m14 2-8 8"/><path d="M10 22v-8"/><path d="M14 22v-4"/></svg>
                </button>
                <button class="tool-btn" data-tool="eraser" title="Eraser">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
                </button>
            </div>
            
            <div class="divider"></div>
            
            <!-- Color Swatches -->
            <div class="tools-group colors-group">
                <div class="color-swatch active" data-color="#FDFCF0" style="background-color: #FDFCF0;"></div>
                <div class="color-swatch" data-color="#E67A53" style="background-color: #E67A53;"></div>
                <div class="color-swatch" data-color="#5383E6" style="background-color: #5383E6;"></div>
                <div class="color-swatch" data-color="#D65B88" style="background-color: #D65B88;"></div>
                
                <button class="tool-btn" id="customColorBtn" title="Custom Color" style="position: relative;">
                    <svg id="customColorIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
                    <input type="color" id="colorPicker" value="#ffffff" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; padding: 0; margin: 0; border: none;">
                </button>
            </div>
            
            <div class="divider"></div>
            
            <!-- Brush Size -->
            <div class="tools-group stroke-group">
                <input type="range" id="sizeSlider" min="1" max="50" value="4">
                <div class="size-preview-wrapper">
                    <div id="sizePreview"></div>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <!-- Actions -->
            <div class="tools-group">
                <button class="tool-btn action-btn" id="undoBtn" title="Undo (Ctrl+Z)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                </button>
                <button class="tool-btn action-btn" id="redoBtn" title="Redo (Ctrl+Y)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
                </button>
                <div class="divider" style="margin: 0 0.5rem;"></div>
                <button class="tool-btn action-btn danger" id="clearBtn" title="Clear Board">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </button>
            </div>
        </div>
        
    </div>

    <!-- Socket.IO Client -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
