<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Time Capsule</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <h1>Time Capsule</h1>
            </div>
            <p class="subtitle">Bury your digital memories safely into the future.</p>
            
            <div class="tabs">
                <button class="tab-btn active" id="tabViewVault">My Vault</button>
                <button class="tab-btn" id="tabCreate">Bury a Memory</button>
            </div>
        </header>

        <!-- View Vault (Grid) -->
        <main id="viewVault" class="main-section">
            <div class="capsules-grid" id="capsulesGrid">
                <!-- Capsules will be rendered here dynamically -->
                <div class="loading-state">Loading your vault...</div>
            </div>
        </main>

        <!-- Create Capsule Form -->
        <main id="createCapsule" class="main-section hidden">
            <form id="capsuleForm" class="glass-card form-container">
                <div class="form-group">
                    <label>Capsule Title</label>
                    <input type="text" id="titleInput" placeholder="e.g. My Thoughts in 2026" required>
                </div>

                <div class="form-group">
                    <label>Secret Message</label>
                    <textarea id="messageInput" rows="5" placeholder="Write something you want your future self to read..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Attach an Image (Optional)</label>
                    <div class="file-upload" id="fileUploadZone">
                        <input type="file" id="imageInput" accept="image/*">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                        <span id="fileLabel">Click or drag an image here</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Set a Password (Optional for Public)</label>
                    <input type="password" id="passwordInput" placeholder="Keep it secret, keep it safe">
                </div>

                <div class="form-group">
                    <label>Unlock Date & Time</label>
                    <input type="datetime-local" id="dateInput" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="12" x2="12" y1="8" y2="16"/><line x1="8" x2="16" y1="12" y2="12"/></svg>
                        <span id="submitBtnText">Bury Capsule</span>
                    </button>
                    <button type="button" class="btn btn-secondary w-100 hidden" id="cancelEditBtn" style="margin-top: 0.5rem; background: rgba(255,255,255,0.1); color: white;">
                        Cancel Edit
                    </button>
                    <div id="formStatus"></div>
                </div>
            </form>
        </main>
        
        <!-- Modal for Unlocked Capsule -->
        <div id="unlockModal" class="modal hidden">
            <div class="modal-content glass-card">
                <button class="close-btn" id="closeModal">&times;</button>
                <div id="modalBody">
                    <!-- Unlocked content goes here -->
                </div>
            </div>
        </div>
        <!-- Modal for Password Auth -->
        <div id="authModal" class="modal hidden">
            <div class="modal-content glass-card" style="max-width: 400px; padding: 2rem;">
                <button class="close-btn" id="closeAuthModal">&times;</button>
                <h2 style="text-align: center; margin-bottom: 1rem;" id="authModalTitle">Enter Password</h2>
                <input type="password" id="authPasswordInput" class="w-100" placeholder="Password" style="margin-bottom: 1rem;">
                <button class="btn btn-primary w-100" id="authSubmitBtn">Submit</button>
                <div id="authStatus" style="color: var(--danger); text-align: center; margin-top: 0.5rem; font-size: 0.9rem;"></div>
            </div>
        </div>

        <!-- Modal for Confirmations -->
        <div id="confirmModal" class="modal hidden">
            <div class="modal-content glass-card" style="max-width: 400px; padding: 2rem; text-align: center;">
                <h2 style="margin-bottom: 1rem; color: var(--primary);">Are you sure?</h2>
                <p style="margin-bottom: 1.5rem; color: var(--text-secondary);">Are you sure you want to permanently delete this public capsule?</p>
                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn btn-secondary w-100" id="confirmCancelBtn">Cancel</button>
                    <button class="btn btn-primary w-100" id="confirmOkBtn" style="background: var(--danger);">Delete</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Script -->
    <script src="script.js?v=2"></script>
</body>
</html>
